study_name: px4_visual_demo_offboard_yaw_sweep_capture
backend: px4
research_tier: demo_only
flight_mode: OFFBOARD_ATTITUDE
scenario: visual_demo
config_profile: px4_visual_demo_offboard_yaw_sweep
seed: 202
repeat_count: 1
sampling_rate_hz: 20.0
x_schema: commands_plus_state
y_schema: delta_state
x_include_groups: []
x_exclude_groups: []
y_include_groups: []
y_exclude_groups: []
feature_map: identity
run_level_covariates_as_inputs: false
stratify_by:
  - mode
pooling_mode: pooled
history_length: 3
prediction_horizon: 2
prediction_horizon_unit: steps
parameter_sweep: {}
internal_signals_enabled: true
perturbation_strategy: visual_yaw_sweep
model:
  - ols_affine
  - ridge_affine
  - lasso_affine
sparsity:
  threshold: 0.05
  ridge_alpha: 0.6
  lasso_alpha: 0.04
  bootstrap_repeats: 6
  stability_selection_threshold: 0.6
reporting:
  stability_repeats: 2
  max_alignment_error_ms: 150
  real_px4_report: true
input_type: attitude
axis: yaw
profile_type: sweep
amplitude: 0.90
bias: 0.0
start_after_s: 1.5
duration_s: 12.0
hold_s: 1.5
hover_thrust: -0.69
timing_required: true
warmup_cycles: 10
ready_timeout_s: 30.0
takeoff_timeout_s: 12.0
land_timeout_s: 10.0
takeoff_altitude_m: 2.0
takeoff_position_tolerance_m: 0.30
min_profile_clearance_m: 0.40
extras:
  auto_clock_bridge: true
  sweep_start_hz: 0.04
  sweep_end_hz: 0.18

study_name: global_linear_commands_plus_state__delta_state
backend: synthetic
flight_mode:
  px4: POSCTL
  ardupilot: STABILIZE
scenario: nominal
config_profile: commands_plus_state_baseline
seed: 11
repeat_count: 4
sampling_rate_hz: 20.0
x_schema: commands_plus_state
y_schema: delta_state
x_include_groups: []
x_exclude_groups: []
y_include_groups: []
y_exclude_groups: []
feature_map: identity
run_level_covariates_as_inputs: true
stratify_by:
  - backend
  - mode
pooling_mode: compare_both
history_length: 2
prediction_horizon: 2
prediction_horizon_unit: steps
parameter_sweep:
  enabled: true
  parameters:
    ctrl_p:
      values:
        - 0.12
        - 0.18
        - 0.24
internal_signals_enabled: true
perturbation_strategy: random_combo
ablation_plan: /home/car/autopilot_lab/configs/ablations/default_schema_ablation.yaml
model:
  - ols_affine
  - ridge_affine
  - lasso_affine
  - thresholded_ols_affine
sparsity:
  threshold: 0.05
  ridge_alpha: 0.6
  lasso_alpha: 0.03
  bootstrap_repeats: 6
  stability_selection_threshold: 0.6
reporting:
  stability_repeats: 3
input_type: manual
axis: composite
profile_type: random
amplitude: 0.35
bias: 0.0
start_after_s: 0.5
duration_s: 5.0
hold_s: 1.0
hover_thrust: -0.69
timing_required: false
warmup_cycles: 5
manual_mode: flight
parameter_overrides:
  synthetic:
    ctrl_p: 0.18
    ctrl_d: 0.03
synthetic:
  sample_count: 600
  noise_std: 0.025
  sparse_matrix_density: 0.18
  backend_identity_cycle:
    - px4
    - ardupilot
  mode_cycle:
    - POSCTL
    - STABILIZE

study_name: global_linear_with_pid_sweep__delta_state
backend: synthetic
flight_mode:
  px4: OFFBOARD_RATE
  ardupilot: GUIDED_NOGPS
scenario: pid_sweep
config_profile: pid_sweep
seed: 23
repeat_count: 4
sampling_rate_hz: 25.0
x_schema: commands_plus_controller_params
y_schema: delta_state
x_include_groups: []
x_exclude_groups: []
y_include_groups: []
y_exclude_groups: []
feature_map: identity
run_level_covariates_as_inputs: true
stratify_by:
  - backend
pooling_mode: compare_both
history_length: 1
prediction_horizon: 2
prediction_horizon_unit: steps
parameter_sweep:
  enabled: true
  parameters:
    ctrl_p:
      values:
        - 0.10
        - 0.15
        - 0.20
    ctrl_d:
      values:
        - 0.02
        - 0.04
internal_signals_enabled: true
perturbation_strategy: parameter_sweep
model:
  - ridge_affine
  - lasso_affine
  - thresholded_ols_affine
sparsity:
  threshold: 0.05
  ridge_alpha: 0.8
  lasso_alpha: 0.04
  bootstrap_repeats: 6
  stability_selection_threshold: 0.6
reporting:
  stability_repeats: 3
input_type: rate
axis: roll
profile_type: step
amplitude: 0.3
bias: 0.0
start_after_s: 0.5
duration_s: 3.0
hold_s: 1.0
hover_thrust: -0.69
timing_required: false
warmup_cycles: 5
parameter_overrides:
  synthetic:
    ctrl_p: 0.15
    ctrl_d: 0.03
synthetic:
  sample_count: 500
  noise_std: 0.02
  sparse_matrix_density: 0.15
  backend_identity_cycle:
    - px4
    - ardupilot
  mode_cycle:
    - OFFBOARD_RATE
    - GUIDED_NOGPS

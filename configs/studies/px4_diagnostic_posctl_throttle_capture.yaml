study_name: px4_diagnostic_posctl_throttle_capture
backend: px4
research_tier: diagnostic_research
flight_mode: POSCTL
scenario: nominal
config_profile: px4_diagnostic_posctl_throttle
seed: 151
repeat_count: 1
sampling_rate_hz: 20.0
x_schema: commands_plus_state
y_schema: delta_state
x_include_groups: []
x_exclude_groups: []
y_include_groups: []
y_exclude_groups: []
feature_map: identity
run_level_covariates_as_inputs: false
stratify_by:
  - mode
pooling_mode: pooled
history_length: 3
prediction_horizon: 2
prediction_horizon_unit: steps
parameter_sweep: {}
internal_signals_enabled: true
perturbation_strategy: single_axis_diagnostic
model:
  - ols_affine
  - ridge_affine
  - lasso_affine
sparsity:
  threshold: 0.05
  ridge_alpha: 0.6
  lasso_alpha: 0.04
  bootstrap_repeats: 6
  stability_selection_threshold: 0.6
reporting:
  stability_repeats: 2
  max_alignment_error_ms: 150
  real_px4_report: true
input_type: manual
axis: throttle
profile_type: pulse_train
amplitude: 0.18
bias: 0.0
start_after_s: 1.0
duration_s: 6.0
hold_s: 1.0
hover_thrust: -0.69
timing_required: true
warmup_cycles: 30
manual_mode: flight
ready_timeout_s: 30.0
takeoff_settle_s: 1.0
takeoff_timeout_s: 14.0
land_timeout_s: 10.0
extras:
  auto_clock_bridge: true
  pulse_count: 5
  pulse_width_s: 0.35
  pulse_gap_s: 0.65

study_name: global_linear_full_augmented__window_summary_response
backend: synthetic
flight_mode:
  px4: OFFBOARD_ATTITUDE
  ardupilot: GUIDED_NOGPS
scenario: full_augmented
config_profile: full_augmented
seed: 31
repeat_count: 4
sampling_rate_hz: 25.0
x_schema: full_augmented
y_schema: window_summary_response
x_include_groups: []
x_exclude_groups: []
y_include_groups: []
y_exclude_groups: []
feature_map: identity
